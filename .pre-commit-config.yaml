repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      # Run ruff linter and auto-fix what it can
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run ruff formatter (replaces black)
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        exclude: ^(app/tests|alembic)/
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - sqlalchemy>=2.0
          - fastapi>=0.100
          - python-jose>=3.0
          - structlog

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace       # Remove trailing whitespace
      - id: end-of-file-fixer         # Ensure files end with a newline
      - id: check-yaml                # Validate YAML syntax
      - id: check-toml                # Validate TOML syntax
      - id: check-merge-conflict      # Block commits with merge conflict markers
      - id: check-added-large-files   # Block large files (>500KB)
        args: [--maxkb=500]
      - id: detect-private-key        # Block committing private keys
