name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

# kill stale runs when a new commit lands on the same branch
concurrency:
  group: "${{ github.workflow }}/${{ github.ref }}"
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # pin ruff — it moves fast and minor versions break rules
      - run: pip install "ruff==0.11.2"

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .


  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # mypy cache makes reruns significantly faster on large diffs
      - uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: mypy-${{ runner.os }}-

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: mypy
        run: mypy . --config-file pyproject.toml


  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pip-audit

      # only scanning prod deps — dev tools don't ship to production
      - name: Audit
        run: pip-audit -r requirements.txt


  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: taskforge_test_user
          POSTGRES_PASSWORD: taskforge_test_pass
          POSTGRES_DB: taskforge_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      APP_NAME: TaskForge
      DEBUG: "false"
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173

      # config.py requires these even though tests hit the test DB
      POSTGRES_USER: taskforge_user
      POSTGRES_PASSWORD: taskforge_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: taskforge_db

      TEST_POSTGRES_USER: taskforge_test_user
      TEST_POSTGRES_PASSWORD: taskforge_test_pass
      TEST_POSTGRES_HOST: localhost
      TEST_POSTGRES_PORT: "5432"
      TEST_POSTGRES_DB: taskforge_test_db

      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

      # set CI_SECRET_KEY in repo secrets for a stable value,
      # otherwise falls back to this throwaway string
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-only-secret-not-used-in-production-32c' }}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

      # OAuth endpoints aren't tested in CI — dummy values are fine
      GOOGLE_CLIENT_ID: ci-dummy
      GOOGLE_CLIENT_SECRET: ci-dummy

      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      HTTP_ONLY: "true"
      ACCESS_TOKEN_COOKIE_MAX_AGE: "900"
      REFRESH_TOKEN_COOKIE_MAX_AGE: "604800"

      # conftest.py disables rate limiting; these just satisfy the config validator
      RATE_LIMIT_REGISTER: 100/minute
      RATE_LIMIT_LOGIN: 100/minute
      RATE_LIMIT_REFRESH: 100/minute

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest app/tests/ -v --tb=short --color=yes


  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # build only, no push — pushing is the deploy pipeline's job
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # single job for branch protection to require — easier to manage
  # than listing every job individually in the repo settings
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, security, test, docker]
    if: always()
    steps:
      - name: All green?
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "CI failed — check the jobs above."
              exit 1
            fi
          done
          echo "All clear."
